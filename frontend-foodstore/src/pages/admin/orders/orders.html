<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos - Admin Food Store</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="../home/css/admin.css" />
  </head>
  <body class="admin-page">

    <header>
      <h1><a href="../../store/home/home.html">Food Store</a></h1>
      <nav>
        <ul>
          <li><a href="../../store/home/home.html" class="btn-nav-estilo">Tienda</a></li>
          <li><button id="logoutButton" class="btn-nav-estilo btn-logout-nav">Cerrar Sesión</button></li>
        </ul>
      </nav>
    </header>

    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-brand">
          <h2>Administración</h2>
          <p>Panel de control</p>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li><a href="../home/home.html">Dashboard</a></li>
            <li><a href="../categories/categories.html">Categorías</a></li>
            <li><a href="../products/products.html">Productos</a></li>
            <li><a href="./orders.html" class="active">Pedidos</a></li>
            <li><a href="../../store/home/home.html">Ver Tienda</a></li>
          </ul>
        </nav>
      </aside>

      <div class="admin-content">
        <div class="admin-page-header">
          <h1>Gestión de Pedidos</h1>
          <div class="filter-bar">
            <label for="status-filter">Estado:</label>
            <select id="status-filter">
              <option value="">Todos los pedidos</option>
              <option value="pending">Pendiente</option>
              <option value="processing">En preparación</option>
              <option value="completed">Entregado</option>
              <option value="cancelled">Cancelado</option>
            </select>
          </div>
        </div>

        <main>
          <div id="orders-empty" hidden>
            <p class="no-results">No hay pedidos registrados.</p>
          </div>
          <div id="orders-container" class="orders-admin-grid"></div>
        </main>
      </div>
    </div>

  </body>
  <script type="module" src="./orders.ts"></script>
</html>
